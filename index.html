<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>chjhs shooter</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <!-- 主頁面 -->
  <div id="mainMenu" class="screen">
    <div class="menu-container">
      <h1>破炮塔大戰</h1>
      <input type="text" id="playerIdInput" placeholder="輸入你的暱稱" maxlength="12" />
      
      <div class="color-picker" id="colorPicker">
        <div class="color-option selected" data-color="#3498db" style="background-color: #3498db;"></div>
        <div class="color-option" data-color="#e74c3c" style="background-color: #e74c3c;"></div>
        <div class="color-option" data-color="#2ecc71" style="background-color: #2ecc71;"></div>
        <div class="color-option" data-color="#f1c40f" style="background-color: #f1c40f;"></div>
        <div class="color-option" data-color="#9b59b6" style="background-color: #9b59b6;"></div>
      </div>

      <button id="startBtn" class="start-button">開始遊戲</button>
    </div>
  </div>
  <!-- 遊戲畫面 -->
  <div id="gameScreen" class="screen hidden">
    <canvas id="gameCanvas"></canvas>
    <div id="joystick" class="joystick" style="display:none;">
      <div id="joystickKnob" class="joystick-knob"></div>
    </div>
  </div>

  <!-- ✅ 提示盒放在 body 裡，固定右上角 -->
  <div id="tip-box"></div>

  <!-- ✅ 路徑要對：若你的檔名是 main.js 就改成 main.js -->
  <script src="script.js"></script>
</body>
